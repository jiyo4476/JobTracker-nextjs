services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: job_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ["npm", "run", "db:migrate"]
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/job_tracker
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/job_tracker
      API_KEY: changeme
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"

  scraper:
    build:
      context: ../job_scraper_python
      dockerfile: Dockerfile
    depends_on:
      app:
        condition: service_started
    environment:
      SCRAPER_API_BASE_URL: http://app:3000
    volumes:
      - ./scraper/config.yml:/app/scraper/config.yml:ro
    # The scraper is a one-shot CLI tool — run it with:
    #   docker compose run --rm scraper [--platform linkedin] [--dry-run]
    profiles:
      - scraper

volumes:
  pgdata:
