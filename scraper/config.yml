api:
  base_url: http://localhost:3000
  key: changeme

proxy:
  enabled: false
  url: ""  # e.g. http://user:pass@proxy-host:port

platforms:
  linkedin:
    enabled: true
    queries:
      - "software engineer"
      - "platform engineer"
      - "devops engineer"
      - "site reliability engineer"
      - "machine learning engineer"
      - "AI engineer"
    location: "United States"
    remote_only: false
    max_pages: 5

  indeed:
    enabled: true
    queries:
      - "software engineer"
      - "devops engineer"
      - "machine learning engineer"
      - "AI engineer"
    location: "Remote"
    max_pages: 5

  glassdoor:
    enabled: false
    queries: []
    max_pages: 3

  dice:
    enabled: false
    queries: []
    max_pages: 3

scraper:
  headless: false
  min_delay_s: 2.5
  max_delay_s: 6.0
  max_retries: 3
